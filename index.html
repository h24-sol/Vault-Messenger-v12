<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vault Messenger v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #22d3ee; --bg: #020617; }
        body {
            background: radial-gradient(circle at top right, #083344, #020617, #000000);
            font-family: 'Outfit', sans-serif; color: #f1f5f9; overflow-x: hidden;
        }
        .app-name { background: linear-gradient(to bottom, #ffffff 30%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neo-input { background: rgba(2, 6, 23, 0.8); border: 1px solid #1e293b; }
        #matrixCanvas { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div id="mainApp" class="w-full max-w-lg glass rounded-[3rem] p-8 md:p-12 relative overflow-hidden text-center">
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl mb-4 flex items-center justify-center shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="app-name text-3xl font-black mb-1">VAULT MESSENGER</h1>
            <p class="text-[8px] tracking-[0.4em] text-slate-500 font-bold uppercase">v5.0 Shadow Protocol</p>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-6">
            <div class="bg-slate-950/50 p-2 rounded-xl border border-slate-800">
                <label class="text-[7px] font-black text-cyan-500 uppercase block">Shift</label>
                <input type="number" id="shift" value="12" class="bg-transparent w-full text-center font-bold text-sm outline-none">
            </div>
            <label class="bg-slate-950/50 p-2 rounded-xl border border-slate-800 cursor-pointer">
                <label class="text-[7px] font-bold text-slate-500 uppercase block">Shadow</label>
                <span id="shadowStat" class="text-[9px] font-black text-cyan-400">LOAD</span>
                <input type="file" id="imgInput" accept="image/png" class="hidden" onchange="handleShadow(this)">
            </label>
            <button onclick="toggleSet('ghost')" id="ghostBtn" class="bg-slate-950/50 p-2 rounded-xl border border-slate-800">
                <label class="text-[7px] font-bold text-slate-500 uppercase block">Ghost</label>
                <span id="ghostStat" class="text-[9px] font-black text-slate-400">OFF</span>
            </button>
            <button onclick="toggleSet('stealth')" id="stealthBtn" class="bg-slate-950/50 p-2 rounded-xl border border-slate-800">
                <label class="text-[7px] font-bold text-slate-500 uppercase block">Stealth</label>
                <span id="stealthStat" class="text-[9px] font-black text-slate-400">OFF</span>
            </button>
        </div>

        <textarea id="msgInput" placeholder="আপনার বার্তা..." class="w-full neo-input rounded-3xl p-5 h-32 text-slate-200 outline-none text-base resize-none mb-6"></textarea>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="run('enc')" class="bg-cyan-500 text-slate-950 font-black py-4 rounded-xl active:scale-95">ENCRYPT</button>
            <button onclick="run('dec')" class="bg-slate-800 text-white font-black py-4 rounded-xl active:scale-95">DECRYPT</button>
        </div>

        <div id="resArea" class="hidden bg-cyan-500/5 border border-cyan-500/10 rounded-3xl p-5">
            <div class="flex justify-between items-center mb-3">
                <span id="resLabel" class="text-[9px] font-bold text-cyan-400 uppercase tracking-widest">Output</span>
                <button id="actionBtn" class="text-[9px] bg-white text-black px-3 py-1 rounded-full font-black">ACTION</button>
            </div>
            <p id="resText" class="text-lg font-medium text-white break-words mb-4"></p>
            <div id="imgBox" class="hidden rounded-lg overflow-hidden border border-cyan-500/20">
                <img id="resImg" src="" class="w-full">
            </div>
        </div>

        <p class="mt-6 text-[7px] text-slate-700 font-black uppercase tracking-[0.4em]">Bangladesh 2026</p>
    </div>
    <canvas id="matrixCanvas"></canvas>

    <script>
        let settings = { ghost: false, stealth: false };
        let shadowSource = null;

        function toggleSet(type) {
            settings[type] = !settings[type];
            document.getElementById(type + 'Stat').innerText = settings[type] ? "ACTIVE" : "OFF";
            document.getElementById(type + 'Stat').style.color = settings[type] ? "#22d3ee" : "#94a3b8";
            if(type === 'stealth') document.getElementById('msgInput').style.webkitTextSecurity = settings[type] ? "disc" : "none";
        }

        function handleShadow(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    shadowSource = e.target.result;
                    document.getElementById('shadowStat').innerText = "READY";
                    document.getElementById('shadowStat').style.color = "#ffffff";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function run(mode) {
            const input = document.getElementById('msgInput');
            const resArea = document.getElementById('resArea');
            const resText = document.getElementById('resText');
            const resImg = document.getElementById('resImg');
            const imgBox = document.getElementById('imgBox');
            const actionBtn = document.getElementById('actionBtn');
            let shift = parseInt(document.getElementById('shift').value) || 0;

            if (shadowSource) {
                const img = new Image();
                img.src = shadowSource;
                await new Promise(r => img.onload = r);
                const cvs = document.getElementById('matrixCanvas');
                const ctx = cvs.getContext('2d');
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0, 0, cvs.width, cvs.height);
                const px = data.data;
                let seed = shift;
                for (let i = 0; i < px.length; i += 4) {
                    px[i] ^= (seed % 255);
                    px[i+1] ^= ((seed * 2) % 255);
                    px[i+2] ^= ((seed * 3) % 255);
                    seed = (seed * 16807) % 2147483647;
                }
                ctx.putImageData(data, 0, 0);
                const finalPng = cvs.toDataURL("image/png");
                
                resText.innerText = "Shadow Created";
                resImg.src = finalPng;
                imgBox.classList.remove('hidden');
                actionBtn.innerText = "DOWNLOAD";
                actionBtn.onclick = () => {
                    // Optimized Download for Android WebView
                    const win = window.open();
                    if(win) {
                        win.document.write(`<img src="${finalPng}" style="width:100%"><p>Long press to save</p>`);
                    } else {
                        const dl = document.createElement('a');
                        dl.href = finalPng;
                        dl.download = "shadow.png";
                        dl.click();
                    }
                };
            } else if (input.value) {
                if(mode === 'dec') shift = -shift;
                const result = input.value.split('').map(c => String.fromCharCode(c.charCodeAt(0) + (c === ' ' ? 0 : shift))).join('');
                resText.innerText = result;
                imgBox.classList.add('hidden');
                actionBtn.innerText = "COPY";
                actionBtn.onclick = () => { navigator.clipboard.writeText(result); alert("Copied!"); };
            }
            resArea.classList.remove('hidden');
            if(settings.ghost) { input.value = ''; shadowSource = null; document.getElementById('shadowStat').innerText = "LOAD"; }
        }
    </script>
</body>
</html>
